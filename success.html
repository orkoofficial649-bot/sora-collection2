<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Order Success | SORA Collection</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&family=Hind+Siliguri:wght@400;600&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        body {
            font-family: 'Poppins', 'Hind Siliguri', sans-serif;
            background: #fff5f8;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }
        .success-card {
            background: white;
            border-radius: 2.5rem;
            box-shadow: 0 25px 50px rgba(236, 64, 122, 0.15);
            animation: slideUp 0.8s cubic-bezier(0.16, 1, 0.3, 1);
            position: relative;
            z-index: 10;
        }
        @keyframes slideUp {
            from { opacity: 0; transform: translateY(40px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .checkmark-circle {
            animation: scaleIn 0.6s cubic-bezier(0.34, 1.56, 0.64, 1) 0.2s backwards;
        }
        @keyframes scaleIn {
            from { transform: scale(0); opacity: 0; }
            to { transform: scale(1); opacity: 1; }
        }
        .btn-home {
            background: linear-gradient(45deg, #ec407a, #880e4f);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .btn-home:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 20px rgba(236, 64, 122, 0.3);
        }
        .gradient-bar {
            height: 6px;
            background: linear-gradient(90deg, #4ade80, #ec407a);
            border-radius: 10px 10px 0 0;
        }
    </style>
</head>
<body class="p-4">

    <div class="max-w-md w-full success-card overflow-hidden">
        <div class="gradient-bar w-full"></div>
        
        <div class="p-8 md:p-10 text-center">
            <div class="mb-6">
                <div class="w-20 h-20 bg-green-50 text-green-500 rounded-full flex items-center justify-center mx-auto mb-6 checkmark-circle border-4 border-green-100 shadow-inner">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-10 w-10" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M5 13l4 4L19 7" />
                    </svg>
                </div>
                <img src="https://i.ibb.co.com/jv80152T/Gemini-Generated-Image-uph57euph57euph5-removebg-preview.png" alt="SORA Logo" class="w-24 mx-auto mb-2 opacity-90">
            </div>

            <h1 class="text-3xl font-bold text-gray-800 mb-2">ধন্যবাদ!</h1>
            <p class="text-pink-600 font-semibold text-lg mb-1">অর্ডারটি সফলভাবে সম্পন্ন হয়েছে</p>
            <div class="inline-block px-4 py-1 bg-gray-100 rounded-full mb-6">
                <p class="text-gray-500 text-xs font-medium">Order ID: <span id="orderId" class="font-mono text-gray-800 font-bold uppercase tracking-wider">#SORA-XXXXXX</span></p>
            </div>
            
            <div class="bg-pink-50 p-5 rounded-2xl border border-dashed border-pink-200 mb-8">
                <p class="text-gray-700 text-sm leading-relaxed">
                    আমাদের একজন প্রতিনিধি খুব শীঘ্রই আপনার মোবাইল নাম্বারে কল করে অর্ডারটি কনফার্ম করবেন। ডেলিভারি সংক্রান্ত তথ্যের জন্য অনুগ্রহ করে ফোনটি সচল রাখুন।
                </p>
            </div>

            <div class="space-y-4">
                <a href="index.html" class="btn-home block w-full text-white font-bold py-4 rounded-2xl shadow-lg text-center uppercase tracking-wide">
                    আরও শপিং করুন
                </a>
                <div class="flex flex-col items-center gap-1 pt-2">
                    <p class="text-[10px] text-gray-400 font-bold uppercase tracking-[0.2em]">SORA COLLECTION</p>
                    <p class="text-[10px] text-pink-400 italic">Quality You Can Trust</p>
                </div>
            </div>
        </div>
    </div>

    <script>
        // Generate and display Order ID
        function generateOrderID() {
            const chars = '0123456789ABCDEF';
            let result = '#SORA-';
            for (let i = 0; i < 6; i++) {
                result += chars.charAt(Math.floor(Math.random() * chars.length));
            }
            document.getElementById('orderId').innerText = result;
        }

        // Trigger Confetti Effect
        function triggerConfetti() {
            const count = 200;
            const defaults = {
                origin: { y: 0.7 },
                colors: ['#ec407a', '#880e4f', '#4ade80']
            };

            function fire(particleRatio, opts) {
                confetti({
                    ...defaults,
                    ...opts,
                    particleCount: Math.floor(count * particleRatio)
                });
            }

            fire(0.25, { spread: 26, startVelocity: 55 });
            fire(0.2, { spread: 60 });
            fire(0.35, { spread: 100, decay: 0.91, scalar: 0.8 });
            fire(0.1, { spread: 120, startVelocity: 25, decay: 0.92, scalar: 1.2 });
            fire(0.1, { spread: 120, startVelocity: 45 });
        }

        window.onload = () => {
            generateOrderID();
            setTimeout(triggerConfetti, 500);
        };
    </script>
</body>
</html>
