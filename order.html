<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SORA | Complete Your Order</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&family=Hind+Siliguri:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Poppins', 'Hind Siliguri', sans-serif;
            background-color: #fff0f5;
            color: #2D3436;
        }
        .order-card {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
        }
        .price-row {
            display: flex;
            justify-content: space-between;
            padding: 8px 0;
            border-bottom: 1px solid #fce4ec;
        }
    </style>
</head>
<body class="py-10 px-4">

    <div class="max-w-md mx-auto order-card p-6">
        <div class="flex items-center gap-2 mb-6">
            <span class="text-2xl">📦</span>
            <h2 class="text-xl font-bold text-pink-800">অর্ডারের বিবরণ:</h2>
        </div>

        <div class="space-y-4">
            <div class="price-row">
                <span class="text-gray-600 font-semibold">প্রোডাক্ট:</span>
                <span id="display-name" class="font-bold text-pink-700 text-right max-w-[200px]">লোড হচ্ছে...</span>
            </div>

            <div class="price-row">
                <span class="text-gray-600 font-semibold">সাইজ:</span>
                <span id="display-size" class="font-bold">--</span>
            </div>

            <div class="price-row">
                <span class="text-gray-600 font-semibold">মূল্য:</span>
                <span id="display-price" class="font-bold">0 TK</span>
            </div>

            <div class="price-row text-red-500">
                <span class="font-semibold">ডেলিভারি চার্জ:</span>
                <span class="font-bold">+ 130 TK</span>
            </div>

            <div class="flex justify-between items-center pt-4 mt-2 border-t-2 border-pink-200">
                <span class="text-lg font-bold text-gray-800">সর্বমোট বিল:</span>
                <span id="display-total" class="text-xl font-extrabold text-pink-700">130 TK</span>
            </div>
        </div>

        <input type="hidden" id="input-product" name="product">
        <input type="hidden" id="input-size" name="size">
        <input type="hidden" id="input-total" name="total">
    </div>

    <script>
        // প্রোডাক্ট ডাটাবেস (index.html এর সাথে মিল রেখে)
        const products = {
            "1": { name: "Kashmiri churi with 4 pics gungru", price: 550 },
            "2": { name: "Rainbow কাঁচের চুড়ি (২ ডজন)", price: 220 },
            "3": { name: "Silk Thread, stone and metal churi", price: 210 },
            "4": { name: "Glass(Lace) Churi with 4 pics ghungru", price: 330 }
        };

        function getOrderDetails() {
            const urlParams = new URLSearchParams(window.location.search);
            const productId = urlParams.get('id');
            const productSize = urlParams.get('size');

            if (productId && products[productId]) {
                const product = products[productId];
                const deliveryCharge = 130;
                const totalBill = product.price + deliveryCharge;

                // UI আপডেট
                document.getElementById('display-name').innerText = product.name;
                document.getElementById('display-size').innerText = productSize || "N/A";
                document.getElementById('display-price').innerText = product.price + " TK";
                document.getElementById('display-total').innerText = totalBill + " TK";

                // হিডেন ইনপুট আপডেট (ভবিষ্যতে ফর্ম সাবমিট করার জন্য)
                document.getElementById('input-product').value = product.name;
                document.getElementById('input-size').value = productSize;
                document.getElementById('input-total').value = totalBill;
            } else {
                document.getElementById('display-name').innerText = "প্রোডাক্ট সিলেক্ট করা হয়নি";
            }
        }

        // পেজ লোড হলে ফাংশনটি রান করবে
        window.onload = getOrderDetails;
    </script>
</body>
</html>
