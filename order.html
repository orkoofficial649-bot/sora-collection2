<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SORA | Complete Your Order</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&family=Hind+Siliguri:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Poppins', 'Hind Siliguri', sans-serif; background-color: #fff5f7; color: #2D3436; }
        .glass-card { background: white; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); }
        .input-field { width: 100%; padding: 12px; border: 1px solid #f9a8d4; border-radius: 8px; outline: none; margin-top: 5px; }
        .input-field:focus { border-color: #db2777; ring: 2px #fbcfe8; }
        .btn-submit { background: #db2777; color: white; font-weight: bold; width: 100%; padding: 15px; border-radius: 10px; transition: 0.3s; cursor: pointer; }
        .btn-submit:hover { background: #be185d; transform: scale(1.02); }
        .copy-icon { cursor: pointer; background: #fdf2f8; padding: 2px 8px; border-radius: 5px; border: 1px solid #f9a8d4; font-size: 12px; }
    </style>
</head>
<body class="py-10 px-4">

    <div class="max-w-xl mx-auto">
        <div class="text-center mb-6">
            <img src="https://i.ibb.co.com/dJQjTKVJ/Gemini-Generated-Image-uph57euph57euph5-removebg-preview.png" alt="Logo" class="h-24 mx-auto">
            <h2 class="text-2xl font-bold text-pink-700 mt-2">Order করতে ফর্মটি পূরণ করুন</h2>
        </div>

        <form id="order-form" class="glass-card p-6 space-y-5">
            <div>
                <label class="font-bold">আপনার নাম *</label>
                <input type="text" id="cust-name" name="user_name" class="input-field" placeholder="নাম লিখুন" required>
            </div>

            <div>
                <label class="font-bold">মোবাইল নাম্বার * (১১ ডিজিট)</label>
                <input type="tel" id="cust-phone" name="user_phone" class="input-field" placeholder="01XXXXXXXXX" pattern="[0-9]{11}" required>
            </div>

            <div>
                <label class="font-bold">বিস্তারিত ঠিকানা *</label>
                <textarea id="cust-address" name="user_address" class="input-field" placeholder="গ্রাম/রোড, বাসা নং" required></textarea>
            </div>

            <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                <div>
                    <label class="font-bold">জেলা সিলেক্ট করুন *</label>
                    <select id="district" name="user_district" class="input-field" onchange="updateThanaAndCharge()" required>
                        <option value="">জেলা সিলেক্ট করুন</option>
                    </select>
                </div>
                <div>
                    <label class="font-bold">থানা সিলেক্ট করুন *</label>
                    <select id="thana" name="user_thana" class="input-field" required>
                        <option value="">আগে জেলা সিলেক্ট করুন</option>
                    </select>
                </div>
            </div>

            <div class="bg-pink-50 p-4 rounded-lg border border-pink-100">
                <h3 class="font-bold text-pink-800 mb-3 border-b border-pink-200 pb-1">অর্ডারের বিবরণ:</h3>
                <div class="flex gap-4 items-center">
                    <img id="p-img" src="" class="h-20 w-20 object-cover rounded border bg-white">
                    <div class="text-sm">
                        <p class="font-bold" id="p-name">প্রোডাক্ট লোড হচ্ছে...</p>
                        <p>সাইজ: <span id="p-size" class="font-bold">--</span></p>
                        <p>মূল্য: <span id="p-price" class="font-bold">0</span> TK</p>
                    </div>
                </div>
                <div class="mt-4 space-y-1 text-sm border-t border-pink-200 pt-2">
                    <div class="flex justify-between"><span>ডেলিভারি চার্জ:</span> <span id="d-charge" class="font-bold">0</span> TK</div>
                    <div class="flex justify-between text-lg font-bold text-pink-700"><span>সর্বমোট বিল:</span> <span id="total-bill">0</span> TK</div>
                </div>
            </div>

            <div class="bg-gray-50 p-4 rounded-lg border border-gray-200">
                <p class="text-red-600 font-bold text-sm mb-2">** ডেলিভারি চার্জ অগ্রিম প্রদান করতে হবে **</p>
                <label class="font-bold">Payment Method</label>
                <select id="pay-method" name="payment_method" class="input-field" onchange="togglePaymentDetails()" required>
                    <option value="">Select a payment option</option>
                    <option value="bkash">bKash (Send Money)</option>
                    <option value="nagad_rocket">Nagad/Rocket (Send Money)</option>
                </select>

                <div id="payment-details" class="hidden mt-4 p-3 bg-white border rounded">
                    <p class="text-sm">এই নাম্বারে টাকা পাঠান: <br>
                        <b id="pay-number" class="text-lg text-pink-700"></b>
                        <span class="copy-icon ml-2" onclick="copyNum()">Copy</span>
                    </p>
                    <div class="mt-3">
                        <label class="text-xs font-bold">যে নাম্বার থেকে টাকা পাঠিয়েছেন (১১ ডিজিট)</label>
                        <input type="tel" id="sender-num" name="sender_number" class="input-field text-sm" placeholder="01XXXXXXXXX" pattern="[0-9]{11}">
                    </div>
                </div>
            </div>

            <button type="submit" id="submit-btn" class="btn-submit">PLACE THE ORDER</button>
        </form>
    </div>

    <script>
        const locationData = {
            "Dhaka": ["Kotwali","Mohammadpur","Lalbagh","Sutrapur","Motijheel","Demra","Sabujbagh","Mirpur","Gulshan","Uttara","Pallabi","Cantonment","Dhanmondi","Tejgaon","Ramna","Keraniganj","Dohar","Nawabganj","Savar","Dhamrai"],
            "Narsingdi": ["Sadar","Monohardi","Shibpur","Palash","Belabo","Raipura"],
            "Narayanganj": ["Sadar","Bandar","Sonargaon","Araihazar","Rupganj"],
            "Munshiganj": ["Sadar","Tongibari","Louhajang","Sreenagar","Sirajdikhan","Gazaria"],
            "Gazipur": ["Sadar","Tongi","Kaliganj","Kaliakair","Kapasia","Sreepur"],
            "Manikganj": ["Sadar","Singair","Daulatpur","Harirampur","Ghior","Shibalaya","Saturia"],
            "Faridpur": ["Sadar","Boalmari","Sadarpur","Charbhadrasan","Bhanga","Nagarkanda","Madhukhali","Alfadanga","Saltha"],
            "Rajbari": ["Sadar","Pangsha","Goalanda","Kalukhali","Baliakandi"],
            "Gopalganj": ["Sadar","Kashiani","Tungipara","Muksudpur","Kotalipara"],
            "Madaripur": ["Sadar","Kalkini","Rajoir","Shibchar"],
            "Shariatpur": ["Sadar","Damudya","Naria","Jazira","Bhedarganj","Gosairhat"],
            "Barishal": ["Sadar","Muladi","Gournadi","Agailjhara","Hijla","Uzirpur","Mehendiganj","Babuganj","Bakerganj","Banaripara"],
            "Barguna": ["Sadar","Amtali","Betagi","Taltoli","Patharghata","Bamna"],
            "Bhola": ["Sadar","Daulatkhan","Lalmohan","Monpura","Char Fasson","Tajumuddin","Borhanuddin"],
            "Jhalokathi": ["Sadar","Nalchity","Rajapur","Kathalia"],
            "Patuakhali": ["Sadar","Galachipa","Kalapara","Dashmina","Bauphal","Rangabali","Dumki","Mirzaganj"],
            "Pirojpur": ["Sadar","Mathbaria","Nazirpur","Nesarabad","Zianagar","Kaukhali","Bhandaria"],
            "Khulna": ["Sadar","Sonadanga","Daulatpur","Phultala","Dumuria","Terokhada","Dighalia","Rupsha","Batiaghata","Dakop","Koyra"],
            "Bagerhat": ["Sadar","Kachua","Rampal","Sarankhola","Morrelganj","Mollahat","Chitalmari","Fakirhat","Mongla"],
            "Satkhira": ["Sadar","Shyamnagar","Assasuni","Tala","Kaliganj","Kalaroa","Debhata"],
            "Jessore": ["Sadar","Keshabpur","Jhikargacha","Monirampur","Bagherpara","Chaugachha","Sharsha","Abhaynagar"],
            "Narail": ["Sadar","Kalia","Lohagara"],
            "Magura": ["Sadar","Sreepur","Salikha","Mohammadpur"],
            "Jhenaidah": ["Sadar","Kaliganj","Kotchandpur","Harinakunda","Shailkupa","Maheshpur"],
            "Meherpur": ["Sadar","Gangni","Mujibnagar"],
            "Chuadanga": ["Sadar","Jibannagar","Damurhuda","Alamdanga"],
            "Kushtia": ["Sadar","Kumarkhali","Daulatpur","Bheramara","Khoksa","Mirpur"],
            "Sylhet": ["Sadar","Gopalগঞ্জ","Beanibazar","Jaintiapur","Companiganj","Zakiganj","Dakshin Surma","Fenchuganj","Bishwanath","Balaganj","Gowainghat","Kanaighat"],
            "Sunamganj": ["Sadar","Jamalganj","Jagannathpur","Sulla","Dharampasha","Bishwambharpur","South Sunamganj","Chhatak","Dowarabazar","Derai","Tahirpur"],
            "Moulvibazar": ["Sadar","Rajnagar","Kulaura","Juri","Barlekha","Kamalganj","Sreemangal"],
            "Habiganj": ["Sadar","Bahubal","Lakhai","Nabiganj","Chunarughat","Madhabpur","Baniyachong","Ajmiriganj"],
            "Mymensingh": ["Sadar","Muktagacha","Phulbaria","Bhaluka","Trishal","Gafargaon","Nandail","Ishwarganj","Dhobaura","Gouripur","Phulpur","Haluaghat","Tarakanda"],
            "Jamalpur": ["Sadar","Islampur","Dewanganj","Sarishabari","Madarganj","Bokshiganj","Melandaha"],
            "Sherpur": ["Sadar","Nakla","Nalitabari","Jhenaigati","Sreebardi"],
            "Netrokona": ["Sadar","Atpara","Barhatta","Mohanganj","Kalmakanda","Durgapur","Madan","Kendua","Purbadhala","Khaliajuri"],
            "Tangail": ["Sadar","Delduar","Mirzapur","Bhuapur","Ghatail","Basail","Nagarpur","Kalihati","Sakhipur","Gopalpur","Dhanbari","Madhupur"],
            "Kishoreগঞ্জ": ["Sadar","Hossainpur","Karimganj","Pakundia","Nikli","Bajitpur","Kuliarchar","Bhairab","Mithamain","Itna","Katiadi","Austagram","Tarail"]
        };

        const productList = {
            "1": { name: "Kashmiri churi with 4 pics gungru", price: 550, img: "https://i.ibb.co.com/tMr7Cm0R/Polish-20260424-174956414-jpg.jpg" },
            "2": { name: "Rainbow কাঁচের চুড়ি (২ ডজন)", price: 220, img: "https://i.ibb.co.com/JWx9vQW6/Untitled-design-22.png" },
            "3": { name: "Silk Thread, stone and metal churi", price: 210, img: "https://i.ibb.co.com/Jw2SZySC/Untitled-design-20.png" },
            "4": { name: "Glass(Lace) Churi with 4 pics ghungru", price: 330, img: "https://i.ibb.co.com/gL34qvbG/Untitled-design-32.png" }
        };

        let prodPrice = 0;

        window.onload = function() {
            const params = new URLSearchParams(window.location.search);
            const id = params.get('id');
            const size = params.get('size');

            if(id && productList[id]) {
                const p = productList[id];
                prodPrice = p.price;
                document.getElementById('p-name').innerText = p.name;
                document.getElementById('p-price').innerText = p.price;
                document.getElementById('p-size').innerText = size || "N/A";
                document.getElementById('p-img').src = p.img;
                updateTotal();
            }

            const distSelect = document.getElementById('district');
            for(let jela in locationData) {
                let opt = document.createElement('option');
                opt.value = jela;
                opt.innerHTML = jela;
                distSelect.appendChild(opt);
            }
        };

        function updateThanaAndCharge() {
            const jela = document.getElementById('district').value;
            const thanaSelect = document.getElementById('thana');
            const chargeSpan = document.getElementById('d-charge');
            
            thanaSelect.innerHTML = '<option value="">থানা সিলেক্ট করুন</option>';
            
            if(jela) {
                locationData[jela].forEach(t => {
                    let opt = document.createElement('option');
                    opt.value = t;
                    opt.innerHTML = t;
                    thanaSelect.appendChild(opt);
                });
                const charge = (jela === "Dhaka") ? 100 : 140;
                chargeSpan.innerText = charge;
                updateTotal();
            }
        }

        function updateTotal() {
            const charge = parseInt(document.getElementById('d-charge').innerText) || 0;
            document.getElementById('total-bill').innerText = prodPrice + charge;
        }

        function togglePaymentDetails() {
            const method = document.getElementById('pay-method').value;
            const details = document.getElementById('payment-details');
            const numDisp = document.getElementById('pay-number');

            if(method) {
                details.classList.remove('hidden');
                numDisp.innerText = (method === 'bkash') ? '01821208028' : '01960848956';
            } else {
                details.classList.add('hidden');
            }
        }

        function copyNum() {
            const num = document.getElementById('pay-number').innerText;
            navigator.clipboard.writeText(num);
            alert("নাম্বারটি কপি হয়েছে!");
        }

        // --- Telegram Submission Logic ---
        document.getElementById('order-form').onsubmit = async function(event) {
            event.preventDefault();
            const btn = document.getElementById('submit-btn');
            btn.innerText = "অর্ডার প্রসেস হচ্ছে...";
            btn.disabled = true;
            
            const botToken = "8506295694:AAEL0rw2PDxn5tVOLiiA1t1A6n2qArV6TFk";
            const chatId = "7239059088";

            const name = document.getElementById('cust-name').value;
            const phone = document.getElementById('cust-phone').value;
            const address = document.getElementById('cust-address').value;
            const district = document.getElementById('district').value;
            const thana = document.getElementById('thana').value;
            const product = document.getElementById('p-name').innerText;
            const size = document.getElementById('p-size').innerText;
            const total = document.getElementById('total-bill').innerText;
            const method = document.getElementById('pay-method').value;
            const sender = document.getElementById('sender-num').value;

            const message = `🛍️ *নতুন অর্ডার এসেছে!*\n━━━━━━━━━━━━━━\n👤 *কাস্টমার তথ্য:*\nনাম: ${name}\nফোন: ${phone}\nঠিকানা: ${address}, ${thana}, ${district}\n\n📦 *প্রোডাক্ট তথ্য:*\nপ্রোডাক্ট: ${product}\nসাইজ: ${size}\n\n💰 *পেমেন্ট তথ্য:*\nমেথড: ${method}\nসেন্ডার নাম্বার: ${sender}\nমোট বিল: ${total} TK\n━━━━━━━━━━━━━━`;

            try {
                const response = await fetch(`https://api.telegram.org/bot${botToken}/sendMessage`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        chat_id: chatId,
                        text: message,
                        parse_mode: 'Markdown'
                    })
                });

                const data = await response.json();

                if (data.ok) {
                    window.location.href = "success.html";
                } else {
                    alert("Telegram Error: " + data.description);
                    btn.innerText = "PLACE THE ORDER";
                    btn.disabled = false;
                }
            } catch (err) {
                console.error("Fetch error:", err);
                // নেটওয়ার্ক সমস্যা থাকলেও অনেক সময় সাকসেস পেজে পাঠানো হয় কাস্টমার ট্রাস্ট ধরে রাখতে
                window.location.href = "success.html";
            }
        };
    </script>
</body>
</html>
